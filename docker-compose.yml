services:
  app:
    build: .
    container_name: ai_commit_advisor_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg2://ai_user:ai_password@postgres:5432/ai_commit_advisor
      PGVECTOR_DIMENSION: "${DOCKER_PGVECTOR_DIMENSION:-768}"
      LLM_PROVIDER: "${DOCKER_LLM_PROVIDER:-local_openai}"
      LLM_BASE_URL: "${DOCKER_LLM_BASE_URL:-http://host.docker.internal:12345/v1}"
      LLM_API_KEY: "${DOCKER_LLM_API_KEY:-}"
      LLM_MODEL: "${DOCKER_LLM_MODEL:-qwen2.5-coder-7b-instruct}"
      EMBEDDING_PROVIDER: "${DOCKER_EMBEDDING_PROVIDER:-local_openai}"
      EMBEDDING_BASE_URL: "${DOCKER_EMBEDDING_BASE_URL:-http://host.docker.internal:12345/v1}"
      EMBEDDING_API_KEY: "${DOCKER_EMBEDDING_API_KEY:-}"
      EMBEDDING_MODEL: "${DOCKER_EMBEDDING_MODEL:-text-embedding-nomic-embed-text-v2-moe}"
      REPO_STORAGE_ROOT: "C:\\dev"
      REPO_PATH_HOST_PREFIX: "C:\\dev"
      REPO_PATH_CONTAINER_PREFIX: /host-dev
      MANAGED_REPO_STORAGE_ROOT: "C:\\dev\\ai-commit-advisor-managed-repos"
      MANAGED_REPO_CONTAINER_PREFIX: /managed-repos
      MANAGED_GIT_ALLOWED_HOSTS: "${MANAGED_GIT_ALLOWED_HOSTS:-github.com,gitlab.com,bitbucket.org}"
      GIT_OPERATION_TIMEOUT_SECONDS: "${GIT_OPERATION_TIMEOUT_SECONDS:-300}"
      NEO4J_ENABLED: "true"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ai_commit_advisor
      NEO4J_DATABASE: neo4j
      NEO4J_WRITE_BATCH_SIZE: "500"
      NEO4J_RETRY_ATTEMPTS: "2"
      NEO4J_RETRY_BACKOFF_SECONDS: "0.5"
    ports:
      - "8501:8501"
    volumes:
      - C:/dev:/host-dev:ro
      - C:/dev/ai-commit-advisor-managed-repos:/managed-repos:rw

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai_commit_advisor_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_commit_advisor
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: ai_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_user -d ai_commit_advisor"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: ai_commit_advisor_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/ai_commit_advisor
      NEO4J_server_memory_pagecache_size: 512M
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
